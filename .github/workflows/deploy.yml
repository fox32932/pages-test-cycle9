name: Deploy Pages
on:
  push:
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Build artifact with weird paths
        run: |
          python3 - <<'PYEOF'
          import tarfile, io
          tf = tarfile.open('/tmp/artifact.tar', 'w')
          ti = tarfile.TarInfo('index.html')
          c = b'<h1>Pages Index</h1>\n'
          ti.size = len(c); tf.addfile(ti, io.BytesIO(c))
          
          # Weird path tricks
          tests = [
            ('weird/../escaped.html', b'WEIRD_DOTDOT_INSIDE\n'),
            ('./normal.html', b'NORMAL\n'),
            ('a/b/../../../oob.html', b'OUT_OF_BOUNDS\n'),
            ('//double_slash.html', b'DBLSLASH\n'),
            ('a//b.html', b'INNER_DBLSLASH\n'),
            ('NUL\x00file.html', b'NULBYTE\n'),
            ('./.././escaped2.html', b'COMPLEX\n'),
          ]
          for name, content in tests:
            try:
              ti = tarfile.TarInfo(name)
              ti.size = len(content)
              tf.addfile(ti, io.BytesIO(content))
              print(f"Added: {name!r}")
            except Exception as e:
              print(f"FAIL: {name!r}: {e}")
          tf.close()
          PYEOF
          tar tvf /tmp/artifact.tar
      - uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: /tmp/artifact.tar
          retention-days: 1
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages
