name: Deploy Pages
on:
  push:
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Cross-repo deploy attempt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARTIFACT_ID: 6716804715
        run: |
          # OIDC token
          OIDC=$(curl -sSL -X GET -H "User-Agent: actions/oidc-client" -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
              "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=https://github.com/fox32932")
          OIDC_TOKEN=$(echo "$OIDC" | python3 -c "import json,sys;print(json.load(sys.stdin)['value'])" 2>/dev/null || echo "")
          echo "OIDC len: ${#OIDC_TOKEN}"
          
          echo "=== Cross-repo deploy: pages-test-cycle9 with B artifact_id ==="
          curl -sS -X POST \
            -H "Authorization: bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/fox32932/pages-test-cycle9/pages/deployment" \
            -d "{\"artifact_id\":$ARTIFACT_ID,\"pages_build_version\":\"$GITHUB_SHA\",\"oidc_token\":\"$OIDC_TOKEN\"}" \
            -w "\nHTTP %{http_code}\n"
